langcode: en
status: true
id: crs_profile_employee
migration_group: crs_migrate
label: 'CRS Profile (Employee)'
source:
  plugin: crs_legacy_table
  key: legacy
  table: qs_employee_master
  alias: e
  fields:
    id: legacy_id
    full_name: full_name
    email: email
    company_id: company_legacy_id
    assigned_coachs_id: coach_legacy_id
  ids:
    legacy_id:
      type: integer
process:
  uid:
    plugin: migration_lookup
    migration: crs_users_employee
    source: legacy_id
  type:
    plugin: default_value
    default_value: employee
  field_full_name: full_name
  field_company:
    plugin: migration_lookup
    migration: crs_users_company
    source: company_legacy_id
  field_coach:
    plugin: migration_lookup
    migration: crs_users_coach
    source: coach_legacy_id
destination:
  plugin: 'entity:profile'
  default_bundle: employee
migration_dependencies:
  required:
    - crs_users_company
    - crs_users_coach
    - crs_users_employee
