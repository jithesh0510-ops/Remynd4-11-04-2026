csv_importer.admin:
  path: "/admin/content/csv-importer"
  defaults:
    _form: '\Drupal\csv_importer\Form\ImporterForm'
    _title: "Import CSV"
  requirements:
    _permission: "access csv importer"

csv_importer.import:
  path: "/admin/content/csv-importer/import"
  defaults:
    _form: '\Drupal\csv_importer\Form\ImporterForm'
    _title: "Import"
  requirements:
    _permission: "access csv importer"

csv_importer.history:
  path: "/admin/content/csv-importer/history"
  defaults:
    _controller: '\Drupal\csv_importer\Controller\HistoryController::history'
    _title: "History"
  requirements:
    _permission: "access csv importer"

csv_importer.revert:
  path: "/admin/content/csv-importer/revert/{import_id}"
  defaults:
    _controller: '\Drupal\csv_importer\Controller\HistoryController::revert'
  requirements:
    _permission: "access csv importer"
    import_id: \d+
