langcode: en
status: true
id: crs_users_employee
migration_group: crs_migrate
label: 'CRS Users (Employee)'
source:
  plugin: crs_legacy_table
  key: legacy
  table: qs_employee_master
  alias: t
  fields:
    id: legacy_id
    email: mail
    full_name: uname
  ids:
    legacy_id:
      type: integer
process:
  name: uname
  mail: mail
  status:
    plugin: default_value
    default_value: 1
  roles:
    plugin: default_value
    default_value:
      - employee
  created:
    plugin: callback
    callable: time
    unpack_source: true
    source: []
  # Set a default password for all migrated users; consider forcing reset post-import.
  pass:
    plugin: default_value
    default_value: 'Temp!ChangeMe123'
destination:
  plugin: 'entity:user'
migration_dependencies: {}
