name: 'CRS Migrate'
type: module
description: 'Migrate users and profiles (company, coach, employee) from legacy SQL tables into Drupal 10.'
core_version_requirement: ^10 || ^11
package: 'CRS'
dependencies:
  - drupal:migrate
  - drupal:migrate_tools
  - drupal:profile
  - coach_reporting_system:coach_reporting_system
  - crs_sync:crs_sync
