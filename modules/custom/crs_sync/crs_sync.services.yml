services:
  logger.channel.crs_sync:
    parent: logger.channel_base
    arguments: ['crs_sync']

  crs_sync.sync_manager:
    class: Drupal\crs_sync\Sync\SyncManager
    arguments:
      $entity_type_manager: '@entity_type.manager'
      $db: '@database'
      $logger: '@logger.channel.crs_sync'
      $time: '@datetime.time'

  crs_sync.migration_reset:
    class: Drupal\crs_sync\Sync\MigrationResetService
    arguments:
      $entityTypeManager: '@entity_type.manager'
      $database: '@database'
      $logger: '@logger.channel.crs_sync'
      $currentUser: '@current_user'

  crs_sync.migration_field_audit:
    class: Drupal\crs_sync\Sync\MigrationFieldAudit
    arguments:
      $entityFieldManager: '@entity_field.manager'
